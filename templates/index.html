<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Forensic Engine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/main.css">
  <style>
    /* Background Modification Starts */
    body {
      background-color: #050505 !important;
      margin: 0;
      overflow-x: hidden;
    }
    #matrix-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      opacity: 0.2;
    }
    /* Background Modification Ends */

    .notification-toast {
      position: fixed;
      top: 24px;
      right: 24px;
      background: var(--bg-surface);
      border: 1px solid var(--danger-border);
      box-shadow: var(--shadow-lg);
      padding: var(--sp-3) var(--sp-5);
      border-radius: var(--radius-md);
      color: var(--danger);
      font-family: var(--font-sans);
      font-size: var(--text-sm);
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: var(--sp-2);
      z-index: 9999;
      animation: slideInRight 0.35s var(--ease-out);
      transition: all 0.3s var(--ease-out);
    }
    @keyframes slideInRight {
      from { transform: translateX(120%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
  </style>
</head>
<body class="upload-page">

  <canvas id="matrix-bg"></canvas>

  <form id="uploadForm" action="/upload_dump" method="POST" enctype="multipart/form-data">
    <div class="upload-card card card-raised">
      <header class="flex flex-col items-center mb-6">
        <div class="flex items-center gap-3 mb-2">
          <i data-lucide="shield" style="width:32px;height:32px;" class="text-accent"></i>
          <h1>Memory Forensic Engine</h1>
        </div>
        <p class="text-secondary text-sm">Upload a file to begin forensic analysis</p>
      </header>

      <div class="upload-zone" id="uploadZone">
        <i data-lucide="upload-cloud" class="icon-upload" style="width:48px;height:48px;"></i>
        <p class="text-muted mt-3" id="dropText">Drop file here or click to browse</p>
        <input type="file" id="fileInput" name="file" hidden>
        <span class="file-name font-mono text-sm mt-2" id="fileName"></span>
      </div>

      <div class="file-hints mt-4">
        <div class="file-hint"><i data-lucide="cpu" style="width:16px;height:16px;"></i><span class="font-mono text-xs">.dmp, .mem, .raw</span></div>
        <div class="file-hint"><i data-lucide="file-code" style="width:16px;height:16px;"></i><span class="font-mono text-xs">.exe, .dll, .elf</span></div>
        <div class="file-hint"><i data-lucide="file-text" style="width:16px;height:16px;"></i><span class="font-mono text-xs">.log, .json, .csv</span></div>
      </div>

      <button type="submit" id="submitBtn" class="btn btn-primary btn-lg w-full mt-4">
        <span>Begin Analysis</span>
        <i data-lucide="arrow-right" style="width:18px;height:18px;"></i>
      </button>
    </div>
  </form>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>
    /* Matrix Effect Script */
    const canvas = document.getElementById('matrix-bg');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const binary = "01010101010101010101";
    const fontSize = 16;
    const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);
    function draw() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#0f0';
      ctx.font = fontSize + 'px monospace';
      for (let i = 0; i < drops.length; i++) {
        const text = binary.charAt(Math.floor(Math.random() * binary.length));
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);
        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
      }
    }
    setInterval(draw, 60);

    (function() {
      'use strict';
      document.addEventListener('DOMContentLoaded', function () {
        lucide.createIcons();
        var uploadForm = document.getElementById('uploadForm');
        var uploadZone = document.getElementById('uploadZone');
        var fileInput = document.getElementById('fileInput');
        var fileName = document.getElementById('fileName');
        var dropText = document.getElementById('dropText');
        uploadZone.addEventListener('click', function () { fileInput.click(); });
        fileInput.addEventListener('change', function () { if (fileInput.files.length > 0) showFile(fileInput.files[0]); });
        uploadZone.addEventListener('dragover', function (e) { e.preventDefault(); uploadZone.classList.add('dragover'); });
        uploadZone.addEventListener('dragleave', function (e) { e.preventDefault(); uploadZone.classList.remove('dragover'); });
        uploadZone.addEventListener('drop', function (e) { e.preventDefault(); uploadZone.classList.remove('dragover'); if (e.dataTransfer.files.length > 0) { fileInput.files = e.dataTransfer.files; showFile(e.dataTransfer.files[0]); } });
        uploadForm.addEventListener('submit', function (e) { if (!fileInput.files || fileInput.files.length === 0) { e.preventDefault(); showNotification("[No file Uploaded]"); } });
        function showFile(file) { fileName.textContent = file.name; fileName.classList.add('visible'); dropText.textContent = "Selected file:"; dropText.style.color = "var(--text-secondary)"; }
        function showNotification(message) { var existing = document.querySelector('.notification-toast'); if (existing) existing.remove(); var toast = document.createElement('div'); toast.className = 'notification-toast'; toast.innerHTML = `<i data-lucide="alert-circle" style="width: 16px; height: 16px;"></i><span>${message}</span>`; document.body.appendChild(toast); lucide.createIcons(); setTimeout(function () { toast.style.opacity = '0'; toast.style.transform = 'translateY(-8px)'; setTimeout(function () { toast.remove(); }, 300); }, 3000); }
      });
    })();
  </script>
</body>
</html>
